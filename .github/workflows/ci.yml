name: StyleBoutik CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  tests:
    name: Tests PHPUnit
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: my_shop_test
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v3

      - name: Installer PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, xml, ctype, iconv, intl, pdo, pdo_mysql

      - name: Installer les dépendances Composer
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Créer le fichier .env.test.local
        run: |
          echo "DATABASE_URL=mysql://root:root@127.0.0.1:3306/my_shop_test?serverVersion=8.0&charset=utf8mb4" >> .env.test.local

      - name: Créer la base de données de test
        run: |
          php bin/console doctrine:database:create --env=test --no-interaction
          php bin/console doctrine:migrations:migrate --env=test --no-interaction

      - name: Lancer les tests PHPUnit
        run: php bin/phpunit --testdox